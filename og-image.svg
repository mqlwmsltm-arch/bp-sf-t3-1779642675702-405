<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c2185b"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fff3e0"/>
      <stop offset="100%" stop-color="#e91e63"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="841" cy="497" r="65" fill="#e91e63" opacity="0.10"/>
    <circle cx="975" cy="247" r="79" fill="#e91e63" opacity="0.13"/>
    <circle cx="1144" cy="129" r="99" fill="#e91e63" opacity="0.13"/>
    <circle cx="1177" cy="253" r="70" fill="#e91e63" opacity="0.16"/>
    <circle cx="979" cy="406" r="21" fill="#e91e63" opacity="0.13"/>
    <circle cx="-18" cy="246" r="79" fill="#e91e63" opacity="0.11"/>
    <rect x="137" y="-61" width="48" height="32" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(33, 1090, 463)"/>
    <rect x="177" y="163" width="67" height="91" rx="8" fill="#c2185b" opacity="0.14" transform="rotate(1, 29, 23)"/>
    <rect x="910" y="348" width="70" height="76" rx="8" fill="#c2185b" opacity="0.10" transform="rotate(27, 639, 434)"/>
    <rect x="130" y="569" width="87" height="87" rx="8" fill="#c2185b" opacity="0.11" transform="rotate(17, -74, 390)"/>
    <rect x="980" y="175" width="49" height="90" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(35, 1148, 658)"/>
    <rect x="344" y="603" width="93" height="42" rx="8" fill="#c2185b" opacity="0.12" transform="rotate(2, 518, 265)"/>
    <rect x="-77" y="497" width="84" height="68" rx="8" fill="#c2185b" opacity="0.03" transform="rotate(24, 379, 200)"/>
    <rect x="238" y="564" width="88" height="88" rx="8" fill="#c2185b" opacity="0.08" transform="rotate(43, 871, -34)"/>
    <polygon points="138,-9 191,97 85,97" fill="#e91e63" opacity="0.09"/>
    <polygon points="746,-47 808,77 684,77" fill="#e91e63" opacity="0.06"/>
    <polygon points="1225,605 1305,765 1145,765" fill="#e91e63" opacity="0.10"/>
    <polygon points="1290,308 1382,492 1198,492" fill="#e91e63" opacity="0.06"/>

  <!-- Wave at bottom -->
  <path d="M0,554 C360,592 840,516 1200,554 L1200,630 L0,630Z" fill="#e91e63" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    백링크 대행 사이트
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — 서버 웜업
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#fff3e0" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#fff3e0" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 백링크 대행 사이트 — 서버 웜업
  </text>
</svg>